<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    </head>
<body>
    <script src="script.js"></script>
</body>
<main>
    <section class="pt-28 pb-20 lg:pb-28 bg-ivory-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-10 reveal-section">
                <div>
                    <span class="text-gold-400 text-xs font-semibold uppercase tracking-widest">Dashboard</span>
                    <h2 class="text-3xl lg:text-4xl font-bold text-navy-500 mt-2">My Pets</h2>
                </div>
                <button onclick="showAddPetForm()" class="btn-gold px-6 py-3 rounded-xl text-xs font-semibold">
                    <i class="fas fa-plus"></i> Add New Pet
                </button>
            </div>

            <div id="add-pet-form" class="hidden mb-8 bg-ivory-100 rounded-2xl p-6 border border-ivory-300 reveal-section">
                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input type="text" id="pet-name-input" placeholder="Pet Name" class="px-4 py-3 rounded-xl">
                    <input type="text" id="pet-type-input" placeholder="Type" class="px-4 py-3 rounded-xl">
                    <input type="text" id="pet-breed-input" placeholder="Breed" class="px-4 py-3 rounded-xl">
                    <input type="number" id="pet-age-input" placeholder="Age" class="px-4 py-3 rounded-xl">
                </div>
                <button onclick="addPet()" class="btn-gold mt-4 px-6 py-3 rounded-xl text-xs font-semibold">Save Pet</button>
            </div>

            <div id="pet-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 reveal-section"></div>
        </div>
    </section>
</main>
